name: Deploy README to Pages via Jekyll

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Configures the GitHub Pages environment properties
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # This uploads the whole root folder but lets Jekyll turn README.md into index.html automatically
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # Publishes the generated static HTML page live to the web
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
